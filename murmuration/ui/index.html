  'ISO-NE': 'rgba(255, 107, 217, 0.14)',
  'SPP':    'rgba(108, 255, 138, 0.14)',
};

// Counter-scale: keep markers and labels at fixed pixel size as the user zooms.
// When zoom-group has scale(k), elements with class .ns-fixed get scale(1/k)
// so they stay visually constant. Their position is still scaled (the parent
// translate compounds with the zoom-group's scale, putting them at the right
// SCREEN location). Net: position scales, size doesn't.
function applyCounterScale(svg, k) {
  if (!svg) return;
  const inv = 1 / Math.max(0.001, k);
  // markers are <g class="marker" transform="translate(x,y)">
  svg.querySelectorAll('.marker').forEach(m => {
    let x = m.dataset.fx, y = m.dataset.fy;
    if (x === undefined) {
      // first time: parse the existing translate(...) into data attrs
      const t = m.getAttribute('transform') || '';
      const match = t.match(/translate\(([-\d.]+)[ ,]+([-\d.]+)\)/);
      if (!match) return;
      x = match[1]; y = match[2];
      m.dataset.fx = x; m.dataset.fy = y;
    }
    m.setAttribute('transform', `translate(${x},${y}) scale(${inv})`);
  });
  // standalone region labels — convert from x/y attrs to transform-based on first pass
  svg.querySelectorAll('.region-label').forEach(t => {
    let x = t.dataset.fx, y = t.dataset.fy;
    if (x === undefined) {
      x = t.getAttribute('x'); y = t.getAttribute('y');
      if (x === null || y === null) return;
      t.dataset.fx = x; t.dataset.fy = y;
      t.removeAttribute('x'); t.removeAttribute('y');
    }
    t.setAttribute('transform', `translate(${x},${y}) scale(${inv})`);
  });
}

function flatGetProjection() {
  const flatEl = document.getElementById('flat-map');
  const svg = flatEl?.querySelector('svg');
  if (!svg) return null;
  const rect = svg.getBoundingClientRect();
  const w = rect.width || flatEl.clientWidth;
  const h = rect.height || flatEl.clientHeight;
  return window.d3.geoAlbersUsa()
    .translate([w/2, h/2])
    .scale(Math.min(w * 1.2, h * 1.9));
}

// Build markers ONCE; subsequent updates mutate attributes in place so the
// CSS pulse animations are not restarted every tick (which caused the blink).
function flatBuildMarkers() {
  if (!flatMap) return;
  if (activeTab !== 'flat') return;
  const svg = document.querySelector('#flat-map svg');
  if (!svg) return;
  flatProjection = flatGetProjection();

  const markersG = svg.querySelector('#flat-markers');
  markersG.innerHTML = '';

  // region containers (under markers) — group sibling AZs visually
  const regionGroups = {};
  Object.values(state.assets).forEach(a => {
    if (!a.region || a.lat == null || a.asset_type !== 'data_center') return;
    (regionGroups[a.region] = regionGroups[a.region] || []).push(a);
  });
  Object.entries(regionGroups).forEach(([regionName, members]) => {
    if (members.length < 2) return;
    const projPts = members.map(m => flatProjection([m.lon, m.lat])).filter(Boolean);
    if (projPts.length < 2) return;
    const cx = projPts.reduce((s, p) => s + p[0], 0) / projPts.length;
    const cy = projPts.reduce((s, p) => s + p[1], 0) / projPts.length;
    const r = Math.max(...projPts.map(p => Math.hypot(p[0]-cx, p[1]-cy))) + 14;
    markersG.insertAdjacentHTML('beforeend',
      `<g class="region-group" data-region="${regionName}">
        <circle class="region-ring" cx="${cx}" cy="${cy}" r="${r}"></circle>
        <text class="region-label" x="${cx}" y="${cy - r - 4}" text-anchor="middle">${regionName}</text>
      </g>`);
  });

  // homes first so they sit under bigger markers
  state.homes.forEach(h => {
    const p = flatProjection([h.lon, h.lat]);
    if (!p) return;
    markersG.insertAdjacentHTML('beforeend',
      `<g class="marker home" transform="translate(${p[0]},${p[1]})" data-kind="home" data-id="${h.home_id}">
        <circle class="core" fill="${colorForHome(h)}"></circle>
      </g>`);
  });

  // ISOs
  Object.values(state.grid).forEach(g => {
    if (g.lat == null) return;
    const p = flatProjection([g.lon, g.lat]);
    if (!p) return;
    const c = colorForBA(g);
    markersG.insertAdjacentHTML('beforeend',
      `<g class="marker iso" transform="translate(${p[0]},${p[1]})" data-kind="ba" data-id="${g.ba}">
        <circle class="pulse-ring" stroke="${c}"></circle>
        <circle class="core" fill="${c}"></circle>
        <text class="label" x="11" y="4">${g.ba}</text>
      </g>`);
  });

  // DCs + VPP
  Object.values(state.assets).forEach(a => {
    if (a.lat == null) return;
    const p = flatProjection([a.lon, a.lat]);
    if (!p) return;
    const isVPP = a.asset_type === 'vpp_aggregator';
    const unavail = a.constraints?.unavailable;
    const ringStroke = isVPP ? '#5CFFC7' : (unavail ? '#FF4757' : '#FFFFFF');
    const coreFill   = isVPP ? '#5CFFC7' : (unavail ? '#FF4757' : '#FFFFFF');
    const cls = isVPP ? 'marker vpp' : (unavail ? 'marker dc unavailable' : 'marker dc');
    markersG.insertAdjacentHTML('beforeend',
      `<g class="${cls}" transform="translate(${p[0]},${p[1]})" data-kind="${isVPP ? 'vpp' : 'dc'}" data-id="${a.asset_id}">
        <circle class="pulse-ring" stroke="${ringStroke}"></circle>
        <circle class="core" fill="${coreFill}"></circle>
        <text class="label" x="9" y="3">${a.asset_id}</text>
      </g>`);
  });

  // wire clicks once
  markersG.querySelectorAll('.marker').forEach(m => {
    m.onclick = () => showDetail({ kind: m.dataset.kind, id: m.dataset.id });
  });

  flatRefreshArcs();
  // re-apply counter-scale so newly-built markers stay fixed-pixel at current zoom
  const curK = (flatZoomBehavior && svg) ? (window.d3.zoomTransform(svg).k || 1) : 1;
  applyCounterScale(svg, curK);
}

// Idempotent attribute updates — called on state changes. Does NOT recreate
// elements, so CSS animations keep running smoothly.
function flatUpdateAttrs() {
  if (!flatMap || activeTab !== 'flat') return;
  const svg = document.querySelector('#flat-map svg');
  if (!svg) return;

  // ISO color updates
  Object.values(state.grid).forEach(g => {
    const node = svg.querySelector(`.marker.iso[data-id="${g.ba}"]`);
    if (!node) return;
    const c = colorForBA(g);
    node.querySelector('.pulse-ring').setAttribute('stroke', c);
    node.querySelector('.core').setAttribute('fill', c);
  });

  // DC / VPP color updates (DCs always white; VPP green-cyan; left static — no-op for now)

  // refresh homes group (homes don't pulse, so rebuilding is cheap and visually fine)
  flatRefreshHomes();
  flatRefreshArcs();
}

function flatRefreshHomes() {
  if (!flatMap || activeTab !== 'flat' || !flatProjection) return;
  const svg = document.querySelector('#flat-map svg');
  if (!svg) return;
  // remove old home group nodes
  svg.querySelectorAll('#flat-markers .marker.home').forEach(n => n.remove());
  // re-insert at the start so they layer under primary markers
  const markersG = svg.querySelector('#flat-markers');
  state.homes.forEach(h => {
    const p = flatProjection([h.lon, h.lat]);
    if (!p) return;
    markersG.insertAdjacentHTML('afterbegin',
      `<g class="marker home" transform="translate(${p[0]},${p[1]})" data-kind="home" data-id="${h.home_id}">
        <circle class="core" fill="${colorForHome(h)}"></circle>
      </g>`);
  });
  // rewire home click handlers since we just recreated them
  svg.querySelectorAll('.marker.home').forEach(m => {
    m.onclick = () => showDetail({ kind: 'home', id: m.dataset.id });
  });
}

function flatRefreshArcs() {
  if (!flatMap || activeTab !== 'flat' || !flatProjection) return;
  const svg = document.querySelector('#flat-map svg');
  if (!svg) return;
  const arcsG = svg.querySelector('#flat-arcs');
  // diff approach: build expected arc set, drop missing, add new
  const desired = {};   // arc_key -> {p1, p2, color}
  Object.values(state.pendingReqs).forEach(r => {
    const ba = state.grid[r.ba];
    const fac = state.assets[r.facility_id];
    if (!ba || !fac || ba.lat == null || fac.lat == null) return;
    const p1 = flatProjection([ba.lon, ba.lat]);
    const p2 = flatProjection([fac.lon, fac.lat]);
    if (!p1 || !p2) return;
    desired[r.request_id] = {
      p1, p2, color: r.needed_mw < 0 ? '#FFB454' : '#5CFFC7',
    };
  });
  // remove arcs not in desired
  arcsG.querySelectorAll('.arc').forEach(el => {
    if (!desired[el.dataset.reqId]) el.remove();
  });
  // add missing arcs
  Object.entries(desired).forEach(([reqId, d]) => {
    if (arcsG.querySelector(`.arc[data-req-id="${reqId}"]`)) return;
    const cx = (d.p1[0]+d.p2[0])/2, cy = (d.p1[1]+d.p2[1])/2 - 30;
    arcsG.insertAdjacentHTML('beforeend',
      `<path class="arc" stroke="${d.color}" data-req-id="${reqId}"
        d="M${d.p1[0]},${d.p1[1]} Q${cx},${cy} ${d.p2[0]},${d.p2[1]}"/>`);
  });
}

// keep legacy name working (called elsewhere)
function redrawFlatMarkers() { flatBuildMarkers(); }

// ====== flat-map transmission overlay ===================================
let flatTransmissionRank = 2;     // default: ≥220kV (all lines we expose in the toggle)
let flatTransmissionCache = {};   // rank -> payload

async function flatLoadTransmission(rank) {
  flatTransmissionRank = rank;
  if (rank === 0) {
    const g = document.getElementById('flat-transmission');
    if (g) g.innerHTML = '';
    document.getElementById('lines-count').textContent = '';
    return;
  }
  if (!flatTransmissionCache[rank]) {
    const r = await fetch(`/api/transmission?min_rank=${rank}`).then(r => r.json());
    flatTransmissionCache[rank] = r;
  }
  flatRenderTransmission();
}

function flatRenderTransmission() {
  if (activeTab !== 'flat' || !flatProjection) return;
  const g = document.getElementById('flat-transmission');
  if (!g) return;
  if (flatTransmissionRank === 0) { g.innerHTML = ''; return; }
  const payload = flatTransmissionCache[flatTransmissionRank];
  if (!payload) return;
  const lines = payload.lines;
  document.getElementById('lines-count').textContent = `${lines.length.toLocaleString()} lines`;

  // build path elements
  let html = '';
  for (const ln of lines) {
    let d = '';
    for (let i = 0; i < ln.coords.length; i++) {
      const p = flatProjection(ln.coords[i]);  // [lon, lat]
      if (!p) continue;
      d += (i === 0 ? 'M' : 'L') + p[0].toFixed(1) + ',' + p[1].toFixed(1);
    }
    if (!d) continue;
    const [r, gn, b] = ln.color;
    const a = 0.35 + ln.rank * 0.07;
    html += `<path class="transmission-line" d="${d}" stroke="rgba(${r},${gn},${b},${a})" style="--base-stroke:${ln.stroke}" fill="none"/>`;
  }
  g.innerHTML = html;
}

// wire the toggle once the DOM is ready
document.querySelectorAll('#lines-volt-seg button').forEach(b => {
  b.onclick = () => {
    document.querySelectorAll('#lines-volt-seg button').forEach(x =>
      x.classList.toggle('active', x === b));
    flatLoadTransmission(parseInt(b.dataset.rank, 10));
  };
});

// ====== flat-map substations overlay ====================================
let flatSubsKv = 345;           // default: ≥345kV (transmission-class)
const flatSubsCache = {};       // kv -> payload

async function flatLoadSubs(kv) {
  flatSubsKv = kv;
  if (kv === 0) {
    const g = document.getElementById('flat-substations');
    if (g) g.innerHTML = '';
    document.getElementById('subs-count').textContent = '';
    return;
  }
  if (!flatSubsCache[kv]) {
    const r = await fetch(`/api/substations?min_kv=${kv}`).then(r => r.json());
    flatSubsCache[kv] = r;
  }
  flatRenderSubs();
}

function flatRenderSubs() {
  if (activeTab !== 'flat' || !flatProjection) return;
  const g = document.getElementById('flat-substations');
  if (!g) return;
  if (flatSubsKv === 0) { g.innerHTML = ''; return; }
  const payload = flatSubsCache[flatSubsKv];
  if (!payload) return;
  document.getElementById('subs-count').textContent = `${payload.count.toLocaleString()} substations`;
  let html = '';
  for (const s of payload.subs) {
    const p = flatProjection([s.lon, s.lat]);
    if (!p) continue;
    html += `<circle class="substation-dot" cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}"/>`;
  }
  g.innerHTML = html;
}

document.querySelectorAll('#subs-volt-seg button').forEach(b => {
  b.onclick = () => {
    document.querySelectorAll('#subs-volt-seg button').forEach(x =>
      x.classList.toggle('active', x === b));
    flatLoadSubs(parseInt(b.dataset.kv, 10));
  };
});

// re-render flat map on resize
window.addEventListener('resize', () => {
  if (activeTab === 'flat' && flatMap) renderFlatMap();
});
</script>
