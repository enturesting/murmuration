<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MURMURATION · Grid-AI Protocol</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep:    #03070F;
    --bg-panel:   #0A1020;
    --bg-elev:    #121A30;
    --bg-soft:    #1A2440;
    --border:     #1F2A4A;
    --border-br:  #2E3D6B;
    --fg:         #E6EDFF;
    --fg-dim:     #98A8CF;
    --fg-mute:    #5E6E92;
    --accent:     #00D9FF;
    --accent2:    #5CFFC7;
    --warn:       #FFB454;
    --hot:        #FF4757;
    --green:      #4ECDC4;
    --gold:       #FFD93D;
    --magenta:    #FF6BD9;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: var(--bg-deep);
    color: var(--fg);
    font-family: "Inter", -apple-system, system-ui, sans-serif;
    font-size: 12px;
    line-height: 1.4;
    user-select: none;
  }
  .mono { font-family: "JetBrains Mono", "SF Mono", Menlo, monospace; }

  /* radial vignette behind globe */
  body::before {
    content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(ellipse 60% 60% at 50% 60%, rgba(0,217,255,0.04) 0%, transparent 70%),
      radial-gradient(ellipse 100% 100% at 50% 100%, rgba(92,255,199,0.03) 0%, transparent 60%);
  }

  /* === HEADER === */
  header {
    position: fixed; top: 0; left: 0; right: 0; height: 44px;
    display: grid; grid-template-columns: 1fr auto 1fr; align-items: center;
    padding: 0 14px;
    background: linear-gradient(180deg, var(--bg-panel) 0%, rgba(10,16,32,0.92) 100%);
    border-bottom: 1px solid var(--border);
    z-index: 100;
    backdrop-filter: blur(8px);
  }
  header .brand { display: flex; align-items: center; gap: 12px; }
  header .logo {
    width: 22px; height: 22px; border: 1px solid var(--accent); position: relative;
    transform: rotate(45deg);
  }
  header .logo::before, header .logo::after {
    content: ""; position: absolute; background: var(--accent);
  }
  header .logo::before { left: 50%; top: 0; bottom: 0; width: 1px; transform: translateX(-50%); }
  header .logo::after  { top: 50%; left: 0; right: 0; height: 1px; transform: translateY(-50%); }
  header .brand h1 {
    font-size: 14px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
  }
  header .brand .sub {
    font-size: 10.5px; color: var(--fg-mute); letter-spacing: 0.18em; text-transform: uppercase;
    margin-left: 6px; padding: 2px 6px; border: 1px solid var(--border-br);
  }
  header .clock {
    text-align: center; font-family: "JetBrains Mono", monospace;
    font-size: 12px; color: var(--accent); letter-spacing: 0.08em;
  }
  header .clock .session { color: var(--fg-mute); margin-right: 12px; }
  header .status {
    display: flex; gap: 14px; justify-content: flex-end; align-items: center;
    font-size: 10.5px; letter-spacing: 0.15em; text-transform: uppercase;
  }
  .pill {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 8px; border: 1px solid var(--border-br);
    background: var(--bg-elev); color: var(--fg-dim);
  }
  .pill .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--fg-mute); }
  .pill.on .dot { background: var(--accent2); box-shadow: 0 0 6px var(--accent2); }
  .pill.warn .dot { background: var(--warn); box-shadow: 0 0 6px var(--warn); }
  .pill.off .dot { background: var(--hot); }

  /* === LAYOUT === */
  .stage {
    position: fixed; top: 44px; left: 0; right: 0; bottom: 0;
    display: grid;
    grid-template-columns: 1fr 280px;
    grid-template-rows: 1fr 200px;
    gap: 0;
  }
  .panel {
    background: rgba(10, 16, 32, 0.78);
    border: 1px solid var(--border);
    backdrop-filter: blur(6px);
    overflow: hidden;
    display: flex; flex-direction: column;
    margin: 8px;
  }
  .panel-head {
    padding: 6px 10px;
    border-bottom: 1px solid var(--border);
    font-size: 10.5px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--fg-dim); display: flex; justify-content: space-between; align-items: center;
    background: linear-gradient(90deg, var(--bg-elev), transparent);
  }
  .panel-head .accent { color: var(--accent); font-family: "JetBrains Mono", monospace; }
  .panel-body { flex: 1; overflow-y: auto; padding: 8px 10px; }

  /* === GLOBE CENTER === */
  .globe-container {
    grid-column: 1; grid-row: 1;
    position: relative; overflow: hidden;
  }
  #globe { position: absolute; inset: 0; }
  /* corner brackets */
  .reticle {
    position: absolute; pointer-events: none; z-index: 5;
    border-color: var(--accent); border-style: solid;
  }
  .reticle.tl { top: 14px; left: 14px; width: 28px; height: 28px;
    border-width: 1px 0 0 1px; }
  .reticle.tr { top: 14px; right: 14px; width: 28px; height: 28px;
    border-width: 1px 1px 0 0; }
  .reticle.bl { bottom: 14px; left: 14px; width: 28px; height: 28px;
    border-width: 0 0 1px 1px; }
  .reticle.br { bottom: 14px; right: 14px; width: 28px; height: 28px;
    border-width: 0 1px 1px 0; }

  /* tabs (top-center of map area) */
  .map-tabs {
    position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
    z-index: 7; pointer-events: auto;
    display: flex; gap: 0; border: 1px solid var(--border-br);
    background: rgba(10, 16, 32, 0.85); backdrop-filter: blur(8px);
  }
  .map-tabs button {
    background: none; border: none; color: var(--fg-mute);
    padding: 6px 14px; cursor: pointer;
    font-family: "JetBrains Mono", monospace; font-size: 10.5px;
    letter-spacing: 0.18em; text-transform: uppercase;
    transition: color 0.15s, background 0.15s;
  }
  .map-tabs button:hover { color: var(--fg); }
  .map-tabs button.active {
    color: var(--accent);
    background: rgba(0,217,255,0.12);
    box-shadow: inset 0 -2px 0 var(--accent);
  }
  .map-tabs button:not(:last-child) { border-right: 1px solid var(--border); }

  /* === STORY TAB — full-page presentation view === */
  /* When story-mode is active, hide all the technical-mode UI and let the
     story tab take over the whole viewport. */
  body.story-mode .right-rail,
  body.story-mode .bottom-rack,
  body.story-mode .reticle,
  body.story-mode .detail-card { display: none !important; }
  body.story-mode .stage {
    grid-template-columns: 1fr;
    grid-template-rows: 1fr;
  }
  body.story-mode .globe-container {
    grid-column: 1 / -1; grid-row: 1 / -1;
  }

  #story-tab {
    position: absolute; inset: 0; display: none;
    background: radial-gradient(ellipse 80% 60% at 50% 35%,
                rgba(0,217,255,0.04) 0%, transparent 70%),
                var(--bg-deep);
    flex-direction: column;
    overflow: hidden;
    z-index: 4;   /* above corner reticles & globe surface, below detail cards */
  }
  .story-grid {
    flex: 1;
    display: grid;
    grid-template-rows: auto auto 1fr auto;
    grid-template-columns: 1fr 480px;
    gap: 18px;
    /* top: clears the absolutely-positioned .map-tabs with breathing room */
    padding: 88px 28px 28px 28px;
    min-height: 0;
  }
  /* Row 1: scenario picker, full width */
  .story-pickers {
    grid-column: 1 / -1; grid-row: 1;
    display: flex; gap: 8px; overflow-x: auto;
    padding-bottom: 6px;
    min-height: 46px;        /* guarantee buttons render at full height */
    align-items: stretch;
    flex-shrink: 0;
  }
  .story-pickers::-webkit-scrollbar { height: 4px; }
  .story-picker-btn {
    flex-shrink: 0;
    background: rgba(10, 16, 32, 0.6);
    border: 1px solid var(--border);
    color: var(--fg-dim);
    padding: 8px 14px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex; align-items: center; gap: 8px;
    font-family: inherit;
  }
  .story-picker-btn:hover {
    color: var(--fg); border-color: var(--border-br);
    background: rgba(10, 16, 32, 0.85);
  }
  .story-picker-btn.active {
    color: var(--accent);
    border-color: var(--accent);
    background: rgba(0,217,255,0.1);
    box-shadow: 0 0 12px rgba(0,217,255,0.25);
  }
  .story-picker-btn .name {
    font-size: 12.5px; font-weight: 500; letter-spacing: 0.02em;
  }
  .story-picker-btn .kind {
    font-size: 9px; padding: 1px 5px; border: 1px solid var(--border-br);
    letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--fg-mute); font-family: "JetBrains Mono", monospace;
  }
  .story-picker-btn .kind.stress      { color: var(--hot);     border-color: var(--hot); }
  .story-picker-btn .kind.surplus     { color: var(--green);   border-color: var(--green); }
  .story-picker-btn .kind.contingency { color: var(--magenta); border-color: var(--magenta); }
  .story-picker-btn .kind.cascade     { color: var(--gold);    border-color: var(--gold); }
  .story-picker-btn .kind.carbon      { color: var(--accent2); border-color: var(--accent2); }

  /* Row 2: hero with scenario name + status */
  .story-header {
    grid-column: 1 / -1; grid-row: 2;
    display: flex; align-items: center; gap: 18px;
    padding: 16px 22px;
    background: linear-gradient(90deg, rgba(0,217,255,0.08), transparent);
    border: 1px solid var(--border-br);
  }
  .story-header .scen-tag {
    font-family: "JetBrains Mono", monospace; font-size: 10px;
    letter-spacing: 0.22em; text-transform: uppercase; color: var(--fg-mute);
    margin-bottom: 5px;
  }
  .story-header .scen-name {
    font-size: 28px; font-weight: 700; color: var(--fg);
    letter-spacing: 0.02em; line-height: 1.1;
  }
  .story-header .scen-desc {
    color: var(--fg-dim); font-size: 13px; max-width: 760px; line-height: 1.5;
    margin-top: 5px;
  }
  .story-header .right-meta {
    margin-left: auto; text-align: right;
    font-family: "JetBrains Mono", monospace;
  }
  .story-header .clock-big {
    font-size: 32px; color: var(--accent); letter-spacing: 0.04em;
    font-weight: 500;
  }
  .story-header .status-pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 12px; border: 1px solid var(--border-br); margin-top: 6px;
    font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--fg-dim);
  }
  .story-header .status-pill .dot {
    width: 8px; height: 8px; border-radius: 50%; background: var(--fg-mute);
  }
  .story-header .status-pill.active .dot { background: var(--accent2); box-shadow: 0 0 8px var(--accent2); animation: blink 1.5s ease-in-out infinite; }
  .story-header .status-pill.complete .dot { background: var(--green); }
  @keyframes blink { 0%,100% { opacity: 1 } 50% { opacity: 0.45 } }

  .story-viz {
    grid-row: 3; grid-column: 1;
    background: rgba(10,16,32,0.55);
    border: 1px solid var(--border);
    overflow: hidden; position: relative;
    display: flex; align-items: center; justify-content: center;
    min-height: 360px;
  }
  .story-viz svg { width: 100%; height: 100%; }
  .story-viz .vlabel {
    position: absolute; top: 14px; left: 16px;
    font-family: "JetBrains Mono", monospace; font-size: 10px;
    letter-spacing: 0.2em; text-transform: uppercase; color: var(--fg-mute);
  }

  .story-narrative {
    grid-row: 3; grid-column: 2;
    background: rgba(10,16,32,0.55);
    border: 1px solid var(--border);
    display: flex; flex-direction: column; min-height: 0;
  }
  .story-narrative .head {
    padding: 10px 14px; border-bottom: 1px solid var(--border);
    font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--fg-dim);
    display: flex; justify-content: space-between; align-items: center;
  }
  .story-narrative .head .accent { color: var(--accent2); font-family: "JetBrains Mono", monospace; }
  .story-narrative .body {
    flex: 1; overflow-y: auto; padding: 14px 16px;
    display: block;
    /* Let the browser preserve scroll position when DOM is inserted above the
       viewport. overflow-anchor is auto by default but we set it explicitly
       so any later style reset doesn't disable it. Each step is also an
       eligible anchor so nested layouts inherit the behavior. */
    overflow-anchor: auto;
    overscroll-behavior: contain;
  }
  .story-narrative .narr-step { overflow-anchor: auto; }
  .story-narrative .body::-webkit-scrollbar { width: 5px; }
  .narr-step {
    margin: 0 0 14px; padding: 10px 12px;
    border-left: 3px solid var(--border-br);
    background: rgba(20, 28, 50, 0.5);
    animation: narrFade 0.4s ease-out;
  }
  @keyframes narrFade {
    from { opacity: 0; transform: translateX(-6px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  .narr-step .meta {
    display: flex; justify-content: space-between; margin-bottom: 5px;
    font-family: "JetBrains Mono", monospace; font-size: 9.5px;
    letter-spacing: 0.14em; text-transform: uppercase;
  }
  .narr-step .meta .icon { font-size: 14px; }
  .narr-step .meta .ts { color: var(--accent); }
  .narr-step .head {
    font-size: 13.5px; font-weight: 600; line-height: 1.35;
    color: var(--fg); margin-bottom: 4px;
  }
  .narr-step .body {
    color: var(--fg-dim); font-size: 12px; line-height: 1.5;
    padding: 0; overflow: visible; flex: none;
  }
  .narr-step .body em { color: var(--accent2); font-style: normal; font-weight: 600; }
  .narr-step .body b  { color: var(--gold);  font-weight: 600; }
  .narr-step.kind-stress     { border-left-color: var(--warn); }
  .narr-step.kind-stress     .head, .narr-step.kind-stress     .meta .icon { color: var(--warn); }
  .narr-step.kind-dispatch   { border-left-color: var(--warn); }
  .narr-step.kind-dispatch   .head, .narr-step.kind-dispatch   .meta .icon { color: var(--warn); }
  .narr-step.kind-ack        { border-left-color: var(--accent2); }
  .narr-step.kind-ack        .head, .narr-step.kind-ack        .meta .icon { color: var(--accent2); }
  .narr-step.kind-migrate    { border-left-color: var(--accent); }
  .narr-step.kind-migrate    .head, .narr-step.kind-migrate    .meta .icon { color: var(--accent); }
  .narr-step.kind-vpp        { border-left-color: var(--green); }
  .narr-step.kind-vpp        .head, .narr-step.kind-vpp        .meta .icon { color: var(--green); }
  .narr-step.kind-contingency{ border-left-color: var(--hot); background: rgba(58,24,32,0.5); }
  .narr-step.kind-contingency .head, .narr-step.kind-contingency .meta .icon { color: var(--hot); }
  .narr-step.kind-result     { border-left-color: var(--accent); background: rgba(16,35,56,0.6); }
  .narr-step.kind-result     .head, .narr-step.kind-result     .meta .icon { color: var(--accent); }
  .narr-step.kind-trigger    { border-left-color: var(--gold); }
  .narr-step.kind-trigger    .head, .narr-step.kind-trigger    .meta .icon { color: var(--gold); }

  .story-stakeholders {
    grid-column: 1 / -1; grid-row: 4;
    display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px;
  }
  .stakeholder-card {
    background: rgba(10,16,32,0.6);
    border: 1px solid var(--border);
    padding: 12px 14px;
    display: flex; flex-direction: column; gap: 6px;
    transition: border-color 0.3s, background 0.3s;
  }
  .stakeholder-card.active {
    border-color: var(--accent);
    background: rgba(0,217,255,0.06);
  }
  .stakeholder-card .label {
    font-family: "JetBrains Mono", monospace; font-size: 10px;
    letter-spacing: 0.2em; text-transform: uppercase; color: var(--fg-mute);
  }
  .stakeholder-card .icon {
    position: absolute; top: 10px; right: 14px;
    font-size: 18px; opacity: 0.4;
  }
  .stakeholder-card .value {
    font-size: 22px; font-weight: 600; color: var(--fg);
    font-family: "JetBrains Mono", monospace; letter-spacing: 0.02em;
    line-height: 1.1;
  }
  .stakeholder-card .value.green { color: var(--green); }
  .stakeholder-card .value.gold { color: var(--gold); }
  .stakeholder-card .value.accent { color: var(--accent); }
  .stakeholder-card .sub {
    font-size: 11px; color: var(--fg-dim); line-height: 1.4;
  }
  .stakeholder-card .sub b { color: var(--fg); font-weight: 600; }
  .stakeholder-card { position: relative; overflow: hidden; }

  /* idle state for story tab */
  .story-idle {
    text-align: center; color: var(--fg-mute);
    font-family: "JetBrains Mono", monospace; font-size: 13px;
    letter-spacing: 0.1em; text-transform: uppercase; padding: 40px;
    line-height: 1.7;
  }
  .story-idle b { color: var(--accent); }

  /* schematic shapes */
  .sch-iso-circle {
    transition: fill 0.4s, stroke 0.4s, filter 0.4s;
  }
  .sch-line {
    fill: none; stroke-width: 2;
    stroke-dasharray: 6 6;
    animation: sch-flow 1.2s linear infinite;
  }
  @keyframes sch-flow {
    from { stroke-dashoffset: 0; }
    to   { stroke-dashoffset: -12; }
  }
  .sch-label {
    fill: var(--fg); font-family: "JetBrains Mono", monospace;
    font-size: 11px; font-weight: 600; letter-spacing: 0.06em;
    paint-order: stroke; stroke: var(--bg-deep); stroke-width: 4;
  }
  .sch-sublabel {
    fill: var(--fg-dim); font-family: "JetBrains Mono", monospace;
    font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase;
    paint-order: stroke; stroke: var(--bg-deep); stroke-width: 3;
  }

  /* flat US map container — sibling of #globe inside .globe-container */
  #flat-map {
    position: absolute; inset: 0; display: none;
    background: radial-gradient(ellipse 60% 60% at 50% 55%,
                rgba(0,217,255,0.04) 0%, transparent 70%);
    cursor: grab;
  }
  #flat-map.panning { cursor: grabbing; }
  #flat-map svg { width: 100%; height: 100%; display: block; }
  #flat-map .state {
    fill: rgba(0,217,255,0.025);
    stroke: rgba(0,217,255,0.18);
    stroke-width: 0.5;
    transition: fill 0.2s;
    pointer-events: visiblePainted;
  }
  #flat-map .state:hover { fill: rgba(0,217,255,0.05); }
  #flat-map .state.highlight {
    fill: rgba(0,217,255,0.08);
    stroke: var(--accent);
    stroke-width: 1.2;
  }
  #flat-map .county {
    fill: rgba(0,217,255,0.015);
    stroke: rgba(0,217,255,0.32);
    stroke-width: 0.4;
  }
  #flat-map .transmission {
    fill: none;
    pointer-events: none;
  }
  /* counter-scale transmission strokes: thinner as the user zooms in.
     `--zf` (zoom factor) is updated by the zoom handler to 1/sqrt(k) so
     stroke-width = base * 1/sqrt(k). vector-effect prevents the auto k× scale
     that SVG would otherwise apply on top. */
  #flat-map svg { --zf: 1; }
  #flat-map .iso-territory {
    pointer-events: none;
    transition: fill 0.3s;
  }
  #flat-map .transmission-line {
    stroke-width: calc(var(--base-stroke, 1) * var(--zf, 1));
    vector-effect: non-scaling-stroke;
  }
  /* substations — small white dots that shrink with zoom (using same --zf var) */
  #flat-map .substations { pointer-events: none; }
  #flat-map .substation-dot {
    fill: #FFFFFF;
    fill-opacity: 0.7;
    stroke: rgba(0,0,0,0.45);
    stroke-width: 0.3;
    vector-effect: non-scaling-stroke;
    r: calc(1.7 * var(--zf, 1));
  }
  #flat-map .lines-seg button.active {
    color: var(--accent) !important;
    background: rgba(0,217,255,0.12) !important;
  }
  .lines-seg button.active {
    color: var(--accent) !important;
    background: rgba(0,217,255,0.12) !important;
  }
  #flat-map .zip-marker {
    fill: #5CFFC7;
    opacity: 0.55;
    cursor: pointer;
    transition: r 0.4s ease, opacity 0.4s, fill 0.4s;
  }
  #flat-map .zip-marker:hover { opacity: 1; }
  #flat-map .zip-marker.inactive {
    fill: #FF4757;
    opacity: 0.45;
  }
  #flat-map .zip-marker.activated {
    fill: #6CFF8A;
    opacity: 1;
    filter: drop-shadow(0 0 3px #6CFF8A);
  }
  #flat-map .zip-marker.activating {
    animation: cluster-pop 0.7s ease-out;
  }
  /* failure flash: cluster drops offline mid-event */
  #flat-map .zip-marker.failing {
    animation: cluster-fail 0.6s ease-out;
  }
  @keyframes cluster-fail {
    0%   { fill: #6CFF8A; r: 2.6; }
    40%  { fill: #FF4757; r: 4; }
    100% { fill: #FF4757; r: 1.6; }
  }
  @keyframes cluster-pop {
    0%   { r: 1.6; }
    40%  { r: 5; opacity: 1; }
    100% { r: 2.6; opacity: 1; }
  }
  /* emission arc from cluster to grid target — green→cyan gradient with flow */
  #flat-map .reserve-arc {
    fill: none;
    stroke: #6CFF8A;
    stroke-width: 1.2;
    opacity: 0.7;
    stroke-dasharray: 3 5;
    animation: reserve-flow 0.8s linear infinite;
    pointer-events: none;
  }
  @keyframes reserve-flow {
    from { stroke-dashoffset: 0; }
    to   { stroke-dashoffset: -8; }
  }
  /* target halo — grows as more clusters come online */
  #flat-map .target-halo {
    fill: none;
    stroke: #6CFF8A;
    stroke-width: 1;
    opacity: 0.45;
    pointer-events: none;
    animation: halo-pulse 1.6s ease-in-out infinite;
  }
  @keyframes halo-pulse {
    0%, 100% { opacity: 0.35; }
    50%      { opacity: 0.75; }
  }

  /* state-select pill (only on flat-map tab) */
  .state-select-pill {
    position: absolute; top: 14px; left: 14px;
    z-index: 7; pointer-events: auto;
    display: flex; align-items: center; gap: 8px;
    padding: 5px 10px;
    background: rgba(10, 16, 32, 0.85);
    border: 1px solid var(--border-br);
    backdrop-filter: blur(8px);
  }
  .state-select-pill label {
    font-family: "JetBrains Mono", monospace; font-size: 9.5px;
    color: var(--fg-mute); letter-spacing: 0.18em; text-transform: uppercase;
  }
  .state-select-pill select {
    background: var(--bg-elev); color: var(--fg);
    border: 1px solid var(--border); padding: 3px 6px;
    font-family: "JetBrains Mono", monospace; font-size: 11px;
    cursor: pointer; outline: none;
  }
  .state-select-pill select:focus { border-color: var(--accent); }
  .zoom-controls {
    position: absolute; top: 14px; left: 280px;
    z-index: 7; pointer-events: auto;
    display: flex; gap: 4px;
  }
  .zoom-controls button {
    background: rgba(10, 16, 32, 0.85);
    border: 1px solid var(--border-br); color: var(--fg-dim);
    width: 26px; height: 26px; cursor: pointer;
    font-family: "JetBrains Mono", monospace; font-size: 12px;
    backdrop-filter: blur(8px);
  }
  .zoom-controls button:hover { color: var(--accent); border-color: var(--accent); }
  #flat-map .marker { cursor: pointer; }
  #flat-map .marker .pulse-ring {
    fill: none; stroke-width: 1;
    transform-origin: center;
    animation: flat-pulse 2.4s ease-out infinite;
  }
  @keyframes flat-pulse {
    0%   { r: 4;  opacity: 0.85; stroke-width: 1.4; }
    100% { r: 18; opacity: 0;    stroke-width: 0.4; }
  }
  #flat-map .marker .core { stroke: rgba(0,0,0,0.4); stroke-width: 0.6; }
  #flat-map .marker .label {
    fill: var(--fg); font-family: "JetBrains Mono", monospace;
    font-size: 10px; letter-spacing: 0.06em;
    paint-order: stroke; stroke: rgba(3,7,15,0.85); stroke-width: 3;
    pointer-events: none;
  }
  #flat-map .marker.iso  .core    { r: 7;   }
  #flat-map .marker.iso  .pulse-ring { animation-duration: 2.4s; }
  #flat-map .marker.dc   .core    { r: 3.5; fill: #FFFFFF; }
  #flat-map .marker.dc   .pulse-ring { stroke: #FFFFFF; animation-duration: 2.6s; }
  #flat-map .marker.dc.unavailable .core    { fill: #FF4757; }
  #flat-map .marker.dc.unavailable .pulse-ring { stroke: #FF4757; }
  /* region container — faint ring grouping sibling AZs in one cloud region */
  #flat-map .region-ring {
    fill: rgba(0,217,255,0.025);
    stroke: rgba(0,217,255,0.28);
    stroke-width: 0.6;
    stroke-dasharray: 3 3;
    pointer-events: none;
  }
  #flat-map .region-label {
    fill: var(--fg-mute); font-family: "JetBrains Mono", monospace;
    font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase;
    paint-order: stroke; stroke: rgba(3,7,15,0.85); stroke-width: 3;
    pointer-events: none;
  }
  #flat-map .marker.vpp  .core    { r: 5.5; fill: #5CFFC7; }
  #flat-map .marker.vpp  .pulse-ring { stroke: #5CFFC7; animation-duration: 2.8s; }
  #flat-map .marker.home .core    { r: 1.4; }
  #flat-map .marker.home .pulse-ring { display: none; }
  #flat-map .arc {
    fill: none; stroke-width: 1.5; opacity: 0.85;
    stroke-dasharray: 4 6;
    animation: flat-arc-dash 1s linear infinite;
  }
  @keyframes flat-arc-dash {
    from { stroke-dashoffset: 0; }
    to   { stroke-dashoffset: -10; }
  }
  #flat-map .legend {
    position: absolute; bottom: 14px; left: 14px;
    display: flex; gap: 14px; padding: 7px 10px;
    background: rgba(10,16,32,0.85); border: 1px solid var(--border);
    backdrop-filter: blur(6px);
    font-family: "JetBrains Mono", monospace; font-size: 10px;
    color: var(--fg-dim); letter-spacing: 0.1em; text-transform: uppercase;
  }
  #flat-map .legend .swatch {
    display: inline-block; width: 9px; height: 9px; border-radius: 50%;
    vertical-align: middle; margin-right: 4px; box-shadow: 0 0 6px currentColor;
  }

  /* globe controls overlay */
  .globe-controls {
    position: absolute; top: 14px; right: 56px; z-index: 6;
    display: flex; gap: 6px; pointer-events: auto;
  }
  .globe-controls button {
    background: rgba(10, 16, 32, 0.85);
    border: 1px solid var(--border-br);
    color: var(--fg-dim);
    padding: 5px 10px;
    font-family: "JetBrains Mono", monospace;
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    cursor: pointer;
    backdrop-filter: blur(6px);
    transition: all 0.15s;
  }
  .globe-controls button:hover {
    color: var(--accent);
    border-color: var(--accent);
    box-shadow: 0 0 8px rgba(0,217,255,0.3);
  }
  .globe-hint {
    position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%);
    z-index: 6; pointer-events: none;
    font-family: "JetBrains Mono", monospace;
    font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--fg-mute);
    padding: 4px 10px; border: 1px solid var(--border);
    background: rgba(10, 16, 32, 0.7);
    backdrop-filter: blur(6px);
    transition: opacity 1s;
  }
  .globe-hint.fade { opacity: 0; }

  .crosshair-info {
    position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
    pointer-events: none;
    width: 80px; height: 80px;
    border: 1px dashed rgba(0,217,255,0.18);
    border-radius: 50%;
  }

  /* (BA cards previously lived in a left rail; now they're click-driven detail cards via .detail-card) */

  /* === RIGHT RAIL: FLEET + SCENARIOS === */
  .right-rail {
    grid-column: 2; grid-row: 1; z-index: 10;
    margin: 8px;
    display: flex; flex-direction: column; gap: 8px;
    overflow: hidden;
  }
  .scen-list {
    background: rgba(10, 16, 32, 0.85);
    border: 1px solid var(--border);
    backdrop-filter: blur(6px);
    overflow: hidden;
    display: flex; flex-direction: column;
    flex-shrink: 0;
  }
  .scen-list .panel-head { font-size: 10px; }
  .scen-list .body { padding: 6px; max-height: 280px; overflow-y: auto; }
  .scen-btn {
    display: block; width: 100%; padding: 7px 9px; margin: 3px 0;
    background: var(--bg-elev); border: 1px solid var(--border);
    color: var(--fg); cursor: pointer; text-align: left;
    transition: all 0.15s;
    font-family: inherit;
  }
  .scen-btn:hover {
    background: var(--bg-soft); border-color: var(--accent);
    box-shadow: 0 0 8px rgba(0,217,255,0.25);
  }
  .scen-btn .top { display: flex; justify-content: space-between; align-items: center; }
  .scen-btn .name { font-size: 11.5px; font-weight: 600; }
  .scen-btn .kind {
    font-size: 9px; padding: 1px 5px; border: 1px solid var(--border-br);
    text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--fg-mute); font-family: "JetBrains Mono", monospace;
  }
  .scen-btn .kind.stress     { color: var(--hot);     border-color: var(--hot); }
  .scen-btn .kind.surplus    { color: var(--green);   border-color: var(--green); }
  .scen-btn .kind.contingency{ color: var(--magenta); border-color: var(--magenta); }
  .scen-btn .kind.cascade    { color: var(--gold);    border-color: var(--gold); }
  .scen-btn .kind.carbon     { color: var(--accent2); border-color: var(--accent2); }
  .scen-btn .desc { font-size: 9.5px; color: var(--fg-mute); margin-top: 4px; line-height: 1.3; }

  .fleet-panel {
    background: rgba(10, 16, 32, 0.85);
    border: 1px solid var(--border);
    backdrop-filter: blur(6px);
    flex: 1;
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .fleet-panel .body { padding: 6px; overflow-y: auto; flex: 1; }
  .asset-card {
    background: var(--bg-elev); border: 1px solid var(--border);
    padding: 8px 10px; margin: 4px 0;
    transition: border-color 0.3s;
  }
  .asset-card.throttled { border-color: var(--warn); }
  .asset-card .head {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;
  }
  .asset-card .head .name { font-weight: 600; font-size: 11.5px; letter-spacing: 0.05em; }
  .asset-card .head .badge {
    font-size: 9px; padding: 1px 5px; border: 1px solid var(--border-br);
    color: var(--fg-mute); font-family: "JetBrains Mono", monospace;
  }
  .asset-card .gauge {
    height: 28px; background: var(--bg-deep); position: relative;
    margin: 4px 0; overflow: hidden;
  }
  .asset-card .gauge .bar {
    position: absolute; left: 0; top: 0; bottom: 0;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.5s, background 0.4s;
  }
  .asset-card .gauge .bar.throttled {
    background: linear-gradient(90deg, var(--warn), var(--gold));
  }
  .asset-card .gauge .floor {
    position: absolute; top: 0; bottom: 0; width: 1px;
    background: var(--hot); opacity: 0.6;
  }
  .asset-card .gauge .label {
    position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
    font-family: "JetBrains Mono", monospace; font-size: 10px;
    color: var(--fg); text-shadow: 0 0 4px rgba(0,0,0,0.8);
    z-index: 1;
  }
  .asset-card .meta {
    display: flex; justify-content: space-between;
    font-size: 9.5px; color: var(--fg-mute); font-family: "JetBrains Mono", monospace;
  }

  /* === BOTTOM === */
  .bottom-rack {
    grid-column: 1 / -1; grid-row: 2;
    display: grid; grid-template-columns: 1fr 1.4fr 280px; gap: 0;
  }
  .bottom-rack .panel { margin: 0 8px 8px; }
  .bottom-rack .panel:first-child { margin-left: 8px; }

  .feed { font-family: "JetBrains Mono", monospace; font-size: 10.5px; }
  .feed .item {
    padding: 5px 7px; margin: 2px 0;
    background: var(--bg-elev); border-left: 2px solid var(--border-br);
    word-wrap: break-word;
    animation: slidein 0.3s ease;
  }
  @keyframes slidein {
    from { opacity: 0; transform: translateX(-4px); }
    to { opacity: 1; transform: translateX(0); }
  }
  .feed .item.envelope   { border-left-color: var(--accent2); }
  .feed .item.dispatch   { border-left-color: var(--warn); background: #2A2243; }
  .feed .item.ack        { border-left-color: var(--accent); }
  .feed .item.contingency{ border-left-color: var(--hot); background: #3A1820; }
  .feed .item.scenario   { border-left-color: var(--gold); background: #2A2410; }
  /* paced scenario steps inline in agent-feed */
  .feed .item.step-trigger    { border-left-color: var(--gold);    }
  .feed .item.step-stress     { border-left-color: var(--warn);    }
  .feed .item.step-dispatch   { border-left-color: var(--warn);    background: #2A2243; }
  .feed .item.step-ack        { border-left-color: var(--accent2); }
  .feed .item.step-vpp        { border-left-color: var(--green);   background: #142A24; }
  .feed .item.step-counter    { border-left-color: var(--magenta); }
  .feed .item.step-contingency{ border-left-color: var(--hot);     background: #3A1820; }
  .feed .item.step-result     { border-left-color: var(--accent);  background: #102338; }
  .feed .item .step-row {
    display: grid; grid-template-columns: 36px 50px 18px 1fr;
    gap: 6px; align-items: start;
  }
  .feed .item .step-row .num {
    color: var(--fg-mute); font-family: "JetBrains Mono", monospace;
    font-size: 10px; text-align: center; font-weight: 600;
  }
  .feed .item .step-row .ts {
    color: var(--accent); font-family: "JetBrains Mono", monospace;
    font-size: 10px;
  }
  .feed .item .step-row .icon {
    text-align: center; font-size: 14px; line-height: 1;
  }
  .feed .item .step-row .text .head {
    font-weight: 600; color: var(--fg); font-size: 11.5px;
  }
  .feed .item .step-row .text .body {
    color: var(--fg-dim); font-size: 10.5px; margin-top: 2px;
    font-family: "JetBrains Mono", monospace;
  }
  .feed .item.step-trigger     .icon, .feed .item.step-trigger     .head { color: var(--gold);    }
  .feed .item.step-stress      .icon, .feed .item.step-stress      .head { color: var(--warn);    }
  .feed .item.step-dispatch    .icon, .feed .item.step-dispatch    .head { color: var(--warn);    }
  .feed .item.step-ack         .icon, .feed .item.step-ack         .head { color: var(--accent2); }
  .feed .item.step-vpp         .icon, .feed .item.step-vpp         .head { color: var(--green);   }
  .feed .item.step-counter     .icon, .feed .item.step-counter     .head { color: var(--magenta); }
  .feed .item.step-contingency .icon, .feed .item.step-contingency .head { color: var(--hot);     }
  .feed .item.step-result      .icon, .feed .item.step-result      .head { color: var(--accent);  }
  .feed .item .t { color: var(--fg-mute); font-size: 9.5px; margin-right: 6px; }
  .feed .item .label {
    display: inline-block; padding: 0 4px; font-size: 9px;
    background: var(--bg-soft); color: var(--fg-dim);
    margin-right: 5px; letter-spacing: 0.08em; text-transform: uppercase;
  }
  .feed .item .head { font-weight: 600; color: var(--fg); }
  .feed .item .body { color: var(--fg-dim); margin-top: 2px; }

  .metrics-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 4px;
  }
  .metric {
    background: var(--bg-elev); border: 1px solid var(--border);
    padding: 6px 8px; transition: border-color 0.3s;
  }
  .metric.tick { border-color: var(--accent); animation: metric-tick 0.6s; }
  @keyframes metric-tick {
    0% { border-color: var(--accent); box-shadow: 0 0 8px var(--accent); }
    100% { border-color: var(--border); box-shadow: none; }
  }
  .metric .lbl {
    font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--fg-mute);
  }
  .metric .val {
    font-family: "JetBrains Mono", monospace; font-size: 16px; font-weight: 600; color: var(--fg);
    margin-top: 2px;
  }
  .metric .val.green { color: var(--green); }
  .metric .val.gold { color: var(--gold); }

  /* (scenario playback now flows into Agent Chatter as paced .step-* feed items) */

  /* === ENTITY DETAIL CARD (clickable globe items) === */
  .detail-card {
    position: absolute;
    top: 60px; left: 14px;
    width: 320px; max-height: calc(100% - 100px);
    background: rgba(10, 16, 32, 0.96);
    border: 1px solid var(--accent);
    box-shadow: 0 0 24px rgba(0,217,255,0.3);
    backdrop-filter: blur(10px);
    overflow: hidden;
    display: flex; flex-direction: column;
    z-index: 10;
    animation: cardin 0.25s ease-out;
  }
  @keyframes cardin {
    from { opacity: 0; transform: translateX(-12px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  .detail-card .head {
    padding: 10px 12px; border-bottom: 1px solid var(--border);
    background: linear-gradient(90deg, rgba(0,217,255,0.15), transparent);
    display: flex; justify-content: space-between; align-items: center;
  }
  .detail-card .head .kind-tag {
    font-size: 9.5px; padding: 2px 6px; border: 1px solid var(--accent);
    color: var(--accent); letter-spacing: 0.15em; text-transform: uppercase;
    font-family: "JetBrains Mono", monospace;
  }
  .detail-card .head .name {
    font-weight: 600; font-size: 14px; letter-spacing: 0.04em;
    color: var(--fg); margin-top: 4px;
  }
  .detail-card .head .close {
    background: none; border: none; color: var(--fg-mute); cursor: pointer;
    font-size: 18px; padding: 0 4px;
  }
  .detail-card .head .close:hover { color: var(--hot); }
  .detail-card .body {
    overflow-y: auto; padding: 10px 12px;
    font-size: 11px; flex: 1;
  }
  .detail-card .row {
    display: flex; justify-content: space-between; padding: 3px 0;
    font-family: "JetBrains Mono", monospace;
  }
  .detail-card .row .lbl { color: var(--fg-mute); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; }
  .detail-card .row .val { color: var(--fg); font-size: 11px; }
  .detail-card .row .val.hot { color: var(--hot); }
  .detail-card .row .val.green { color: var(--green); }
  .detail-card h5 {
    margin: 12px 0 6px; font-size: 10px;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--accent); font-weight: 600;
    border-bottom: 1px dashed var(--border); padding-bottom: 3px;
  }
  .detail-card .band {
    display: grid; grid-template-columns: 1fr auto auto;
    gap: 4px; padding: 5px 0; font-size: 10.5px;
    border-bottom: 1px dashed rgba(46,61,107,0.4);
  }
  .detail-card .band:last-child { border-bottom: none; }
  .detail-card .band .cls {
    font-family: "JetBrains Mono", monospace;
    font-size: 9.5px; color: var(--fg-mute);
  }
  .detail-card .band .mw {
    color: var(--accent2); font-family: "JetBrains Mono", monospace;
    font-weight: 600;
  }
  .detail-card .band .cost {
    color: var(--gold); font-family: "JetBrains Mono", monospace;
    font-size: 10.5px;
  }
  .detail-card .band .notes {
    grid-column: 1/4; color: var(--fg-mute); font-size: 9.5px;
    margin-top: 1px;
  }
  .detail-card .spark {
    height: 36px; margin: 6px 0;
    background: var(--bg-deep); position: relative;
    border: 1px solid var(--border); padding: 2px;
  }
  .detail-card .spark svg { width: 100%; height: 100%; }

  /* scrollbars */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg-deep); }
  ::-webkit-scrollbar-thumb { background: var(--border-br); }
</style>
</head>

<body>

<header>
  <div class="brand">
    <div class="logo"></div>
    <h1>Murmuration</h1>
    <span class="sub">Grid · AI Protocol</span>
  </div>
  <div class="clock mono">
    <span class="session">SESSION 0xA47B</span>
    <span id="clock">--:--:-- UTC</span>
  </div>
  <div class="status">
    <span class="pill" id="ws-pill"><span class="dot"></span><span id="ws-text">Linking…</span></span>
    <span class="pill" id="claude-pill"><span class="dot"></span><span id="claude-text">Claude</span></span>
    <span class="pill on"><span class="dot"></span>3 ISO · 3 DC</span>
  </div>
</header>

<div class="stage">
  <div class="globe-container">
    <div id="globe"></div>
    <div id="flat-map"></div>
    <div id="story-tab"></div>
    <div class="map-tabs" id="map-tabs">
      <button data-tab="globe" class="active">◐ 3D Globe</button>
      <button data-tab="flat">▦ Flat Map</button>
      <button data-tab="story">◇ Story</button>
    </div>
    <div class="state-select-pill" id="state-select-pill" style="display:none">
      <label for="state-select">FOCUS</label>
      <select id="state-select">
        <option value="">All US</option>
        <option value="11">District of Columbia</option>
        <option value="10">Delaware</option>
        <option value="24">Maryland</option>
        <option value="51">Virginia</option>
        <option value="54">West Virginia</option>
      </select>
    </div>
    <div class="zoom-controls" id="zoom-controls" style="display:none">
      <button id="zoom-in" title="Zoom in">+</button>
      <button id="zoom-out" title="Zoom out">−</button>
      <button id="zoom-reset" title="Reset zoom">⟲</button>
    </div>
    <div class="state-select-pill" id="lines-toggle-pill" style="display:none; left: auto; right: 14px;">
      <label>LINES</label>
      <div class="seg" id="lines-volt-seg" style="display:flex;border:1px solid var(--border)">
        <button data-rank="0" style="background:var(--bg-elev);color:var(--fg-dim);border:none;padding:3px 7px;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:10px">OFF</button>
        <button data-rank="4" style="background:var(--bg-elev);color:var(--fg-dim);border:none;padding:3px 7px;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:10px;border-left:1px solid var(--border)">≥500kV</button>
        <button data-rank="3" style="background:var(--bg-elev);color:var(--fg-dim);border:none;padding:3px 7px;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:10px;border-left:1px solid var(--border)">≥345kV</button>
        <button data-rank="2" class="active" style="background:var(--bg-elev);color:var(--fg-dim);border:none;padding:3px 7px;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:10px;border-left:1px solid var(--border)">≥220kV</button>
      </div>
      <span class="info" id="lines-count" style="color:var(--fg-mute);font-family:'JetBrains Mono',monospace;font-size:10px"></span>
    </div>
    <div class="state-select-pill" id="subs-toggle-pill" style="display:none; left: auto; right: 14px; top: 60px;">
      <label>SUBSTATIONS</label>
      <div class="seg" id="subs-volt-seg" style="display:flex;border:1px solid var(--border)">
        <button data-kv="0" style="background:var(--bg-elev);color:var(--fg-dim);border:none;padding:3px 7px;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:10px">OFF</button>
